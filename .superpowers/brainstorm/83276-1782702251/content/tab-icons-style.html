<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tab 图标方案</title>
  <style>
    :root {
      --primary: #0f766e;
      --muted: #697586;
      --text: #111827;
      --line: #e5e7eb;
      --bg: #f7f9fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    h1 { margin: 0 0 8px; font-size: 24px; font-weight: 700; }
    .subtitle { margin: 0 0 24px; color: #4b5563; font-size: 14px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .preview {
      height: 190px;
      padding: 28px 18px 18px;
      display: flex;
      align-items: flex-end;
      background: linear-gradient(#ffffff, #fbfcfd);
    }
    .bar {
      width: 100%;
      height: 72px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      border: 1px solid #eef2f5;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .06);
    }
    .item { text-align: center; color: var(--muted); font-size: 12px; }
    .item.active { color: var(--primary); }
    .item svg {
      width: 24px;
      height: 24px;
      display: block;
      margin: 0 auto 5px;
    }
    .line svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .solid svg { fill: currentColor; }
    .body { padding: 16px; border-top: 1px solid var(--line); }
    .body h2 { margin: 0 0 8px; font-size: 16px; }
    .body p { margin: 0; color: #4b5563; font-size: 13px; line-height: 1.6; }
    .tag {
      display: inline-flex;
      margin-bottom: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      color: var(--primary);
      background: #ecfdf5;
      font-size: 12px;
      font-weight: 600;
    }
    @media (max-width: 900px) {
      body { padding: 18px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>免费开源 tab 图标方案</h1>
  <p class="subtitle">下面是更接近真实小程序底栏的效果。当前项目选中色继续使用 #0f766e，未选中使用 #697586。</p>

  <div class="grid">
    <section class="card">
      <div class="preview">
        <div class="bar line">
          <div class="item active">
            <svg viewBox="0 0 24 24"><path d="m3 10 9-7 9 7"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
            首页
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
            搜索
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/><path d="M6 19h12"/></svg>
            发布
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
            消息
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
            我的
          </div>
        </div>
      </div>
      <div class="body">
        <span class="tag">推荐</span>
        <h2>Lucide 风格</h2>
        <p>2px 线性图标，轻、干净、统一。适合“服链通”这种资源/供需工具型小程序。</p>
      </div>
    </section>

    <section class="card">
      <div class="preview">
        <div class="bar line">
          <div class="item active">
            <svg viewBox="0 0 24 24"><path d="M4 10.5 12 4l8 6.5V20H4z"/><path d="M9 20v-6h6v6"/></svg>
            首页
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M16 16l4 4"/></svg>
            搜索
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><rect x="5" y="6" width="14" height="14" rx="2"/><path d="M12 10v6"/><path d="M9 13h6"/></svg>
            发布
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><path d="M5 5h14v11H9l-4 4z"/><path d="M9 9h6"/><path d="M9 12h4"/></svg>
            消息
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c1.2-4 12.8-4 14 0"/></svg>
            我的
          </div>
        </div>
      </div>
      <div class="body">
        <h2>TDesign Icons 风格</h2>
        <p>腾讯系设计语言，中文产品适配度高；图标更规整，但个性略弱。</p>
      </div>
    </section>

    <section class="card">
      <div class="preview">
        <div class="bar solid">
          <div class="item active">
            <svg viewBox="0 0 24 24"><path d="M12 3 3 10v10h6v-6h6v6h6V10z"/></svg>
            首页
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><path d="M10.5 3a7.5 7.5 0 1 0 4.7 13.4l3.7 3.7 1.2-1.2-3.7-3.7A7.5 7.5 0 0 0 10.5 3z"/></svg>
            搜索
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18zm1 8h4v2h-4v4h-2v-4H7v-2h4V7h2z"/></svg>
            发布
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><path d="M4 4h16v12H8l-4 4z"/></svg>
            消息
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm-8 9a8 8 0 0 1 16 0z"/></svg>
            我的
          </div>
        </div>
      </div>
      <div class="body">
        <h2>填充风格</h2>
        <p>识别强但更重，底栏会显得拥挤；除非想强化活跃状态，否则不建议。</p>
      </div>
    </section>
  </div>
</body>
</html>
